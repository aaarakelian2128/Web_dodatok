<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завдання - TaskFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="logo-box">T</i>TASKFLOW</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto text-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Головна</a></li>
                    <li class="nav-item"><a class="nav-link active" href="workspace.html">Керування</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Вхід</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html">Реєстрація</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-2">
        <div class="row g-4">
            <div class="col-12 col-lg-4">
                <div class="card p-3 h-100">
                    <h5 class="fw-bold mb-3 text-center text-lg-start">Нове завдання</h5>
                    <input type="text" class="form-control mb-2" placeholder="Назва...">
                    <textarea class="form-control mb-3" rows="3" placeholder="Опис..."></textarea>
                    <button class="btn btn-primary w-100">Додати</button>
                </div>
            </div>
            <div class="col-12 col-lg-8">
                <div class="card p-3">
                    <h5 class="fw-bold mb-3">Ваші справи</h5>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead class="table-light">
                                <tr><th>Завдання</th><th>Статус</th></tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>Завантажити ЛР на GitHub</td>
                                    <td><span class="badge bg-warning text-dark">В процесі</span></td>
                                </tr>
                                <tr>
                                    <td>Налаштувати адаптивність</td>
                                    <td><span class="badge bg-success">Готово</span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
