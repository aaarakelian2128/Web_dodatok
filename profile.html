<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профіль - TaskFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="logo-box">T</i>TASKFLOW</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto text-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Головна</a></li>
                    <li class="nav-item"><a class="nav-link" href="workspace.html">Керування</a></li>
                    <li class="nav-item"><a class="nav-link active" href="profile.html">Профіль</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Вхід</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html">Реєстрація</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4 py-md-5">
        <div class="row justify-content-center">
            <!-- Контейнер, куди JS вставить картку профілю або повідомлення про вхід -->
            <div class="col-12 col-sm-10 col-md-8 col-lg-6">
    <div class="card shadow-sm border-0 overflow-hidden">
        <!-- Шапка профілю (синя частина) -->
        <div id="profile-header" class="card-header bg-primary text-white text-center py-4 py-md-5">
            <div id="user-avatar" class="mx-auto bg-white text-primary rounded-circle shadow-sm d-flex align-items-center justify-content-center mb-3" 
                 style="width: 90px; height: 90px; font-size: 2rem; font-weight: bold;">
                 ?
            </div>
            <h3 id="user-name-display" class="h4 mb-1">Гість</h3>
            <p id="user-status-display" class="mb-0 opacity-75 small">Профіль не завантажено</p>
        </div>

        <!-- Тіло профілю -->
        <div id="profile-body-content" class="card-body p-4">
            <h5 class="fw-bold mb-3 border-bottom pb-2">Інформація</h5>
            <div id="user-info-list" class="list-group list-group-flush">
                <!-- Дані будуть вставлені сюди через JS -->
                <div class="text-center py-3 text-muted">Перевірка авторизації...</div>
            </div>

            <div id="profile-actions" class="d-grid gap-2 mt-4">
                <!-- Кнопки зміняться динамічно -->
            </div>
        </div>
    </div>
</div>
        </div>
    </div>

    <footer class="text-center py-3">
        <div class="container">
            <p class="mb-0 small">© 2026 TaskFlow</p>
        </div>
    </footer>

    <!-- Важливо: тип module для роботи імпортів -->
    <script type="module" src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
